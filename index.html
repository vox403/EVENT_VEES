<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#050505">
  <title>V-CAM ARCADE</title>
  <link rel="preload" as="image" href="assets/2.png">
  <link rel="preload" as="image" href="assets/2-1.png">
  <link rel="preload" as="image" href="assets/2-2.png">
  <link rel="preload" as="image" href="assets/2-3.png">
  <link rel="preload" as="image" href="assets/vel-c.png">
  <link rel="preload" as="image" href="assets/vox-c.png">
  <link rel="preload" as="image" href="assets/val-c.png">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/loading.css">
  <link rel="stylesheet" href="css/selection.css?v=3">
  <link rel="stylesheet" href="css/layout.css?v=4">
  <link rel="stylesheet" href="css/games.css?v=5">
  <link rel="stylesheet" href="css/overlays.css">
  <link rel="stylesheet" href="css/motion.css">
  <link rel="stylesheet" href="css/responsive.css?v=3">
</head>
<body>
  <section class="loading-screen is-active" id="loadingScreen" aria-label="로딩 화면">
    <div class="loading-noise"></div>
    <div class="loading-panel">
      <p class="loading-kicker">V-CAM CONNECTION</p>
      <div class="loading-art-wrap" id="loadingArtWrap">
        <img class="loading-art" id="loadingArt" src="assets/2.png" alt="로딩 일러스트">
      </div>
      <div class="loading-copy">
        <span>LOADING</span>
        <strong id="loadingPercent">0%</strong>
      </div>
      <div class="loading-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="loadingBar">
        <div class="loading-bar-fill" id="loadingBarFill"></div>
      </div>
      <p class="loading-status" id="loadingStatus">CAMERA SIGNAL SEARCHING</p>
    </div>
  </section>

  <section class="selection-screen" id="selectionScreen" aria-hidden="true">
    <div class="selection-grid" aria-label="캐릭터 선택">
      <button class="entry-card" type="button" data-character="vel" aria-label="Vel 선택">
        <span class="entry-portrait">
          <img src="assets/vel-m.png" data-default="assets/vel-m.png" data-hover="assets/vel-c.png" alt="Vel">
        </span>
        <span class="entry-meta">
          <span class="entry-account">@Vel_spotlight_</span>
          <span class="entry-quote">설명이 더 필요해?</span>
        </span>
      </button>
      <button class="entry-card" type="button" data-character="vox" aria-label="Vox 선택">
        <span class="entry-portrait">
          <img src="assets/vox-m.png" data-default="assets/vox-m.png" data-hover="assets/vox-c.png" alt="Vox">
        </span>
        <span class="entry-meta">
          <span class="entry-account">@vox403_</span>
          <span class="entry-quote">Trust us!</span>
        </span>
      </button>
      <button class="entry-card" type="button" data-character="val" aria-label="Val 선택">
        <span class="entry-portrait">
          <img src="assets/val-m.png" data-default="assets/val-m.png" data-hover="assets/val-c.png" alt="Val">
        </span>
        <span class="entry-meta">
          <span class="entry-account">@pimplife_</span>
          <span class="entry-quote">여전히 난 쌍년이야.</span>
        </span>
      </button>
    </div>
  </section>

  <main class="main-screen" id="mainScreen" aria-hidden="true">
    <header class="site-header">
      <div>
        <p class="eyebrow">LIVE INTERACTIVE FEED</p>
        <h1>V-CAM ARCADE</h1>
      </div>
      <div class="header-signal"><span></span>ONLINE</div>
    </header>

    <div class="game-layout">
      <section class="camera-column">
        <div class="camera-frame" id="cameraFrame">
          <div class="camera-grid"></div>
          <div class="scanline"></div>
          <div class="camera-topbar">
            <span class="rec-label"><i></i>REC</span>
            <span id="cameraCode">CAM_00 / STANDBY</span>
          </div>
          <div class="focus-corner corner-tl"></div>
          <div class="focus-corner corner-tr"></div>
          <div class="focus-corner corner-bl"></div>
          <div class="focus-corner corner-br"></div>

          <section class="idle-feed" id="idleFeed">
            <div class="idle-reticle">
              <span></span>
              <span></span>
            </div>
            <p>SELECT A SUBJECT</p>
          </section>

          <section class="game-host" id="gameHost" aria-live="polite"></section>

          <div class="camera-bottombar">
            <span id="cameraMode">AUTO FOCUS</span>
            <span id="cameraClock">00:00:00</span>
          </div>
        </div>

        <div class="game-actions" id="gameActions">
          <button type="button" id="restartGameButton" disabled>RESTART</button>
          <button type="button" id="closeGameButton" disabled>DISCONNECT</button>
        </div>
      </section>

      <aside class="ranking-panel">
        <div class="ranking-head">
          <div>
            <p>TOP 10</p>
            <h2 id="rankingTitle">RANKING</h2>
          </div>
          <button type="button" id="refreshRankingButton" aria-label="랭킹 새로고침">↻</button>
        </div>
        <ol class="ranking-list" id="rankingList">
          <li class="ranking-empty">인물을 선택해 주세요.</li>
        </ol>
      </aside>
    </div>

    <section class="character-select" aria-label="캐릭터 선택">
      <button class="character-card" type="button" data-character="vel" aria-label="Vel 퍼즐 게임 시작">
        <span class="account-bubble">@Vel_spotlight_</span>
        <span class="portrait-shell">
          <img src="assets/vel-m.png" data-default="assets/vel-m.png" data-hover="assets/vel-c.png" alt="Vel">
        </span>
        <span class="character-name">VEL</span>
        <span class="character-quote">설명이 더 필요해?</span>
      </button>

      <button class="character-card" type="button" data-character="vox" aria-label="Vox 리듬 게임 시작">
        <span class="account-bubble">@vox403_</span>
        <span class="portrait-shell">
          <img src="assets/vox-m.png" data-default="assets/vox-m.png" data-hover="assets/vox-c.png" alt="Vox">
        </span>
        <span class="character-name">VOX</span>
        <span class="character-quote">Trust us!</span>
      </button>

      <button class="character-card" type="button" data-character="val" aria-label="Val 사격 게임 시작">
        <span class="account-bubble">@pimplife_</span>
        <span class="portrait-shell">
          <img src="assets/val-m.png" data-default="assets/val-m.png" data-hover="assets/val-c.png" alt="Val">
        </span>
        <span class="character-name">VAL</span>
        <span class="character-quote">여전히 난 쌍년이야.</span>
      </button>
    </section>
  </main>

  <footer class="site-credit" id="siteCredit" aria-hidden="true">
  <span>제작 867988</span>
  <span class="credit-divider">｜</span>
  <span>CG mariposa</span>
  </footer>

  <div class="modal-layer" id="resultModal" aria-hidden="true">
    <section class="result-modal" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
      <p class="modal-kicker" id="resultGameLabel">GAME COMPLETE</p>
      <h2 id="resultTitle">기록 등록</h2>
      <p class="result-summary" id="resultSummary"></p>
      <form id="scoreForm">
        <label for="playerName">랭킹에 등록할 이름을 쓰세요</label>
        <input id="playerName" name="playerName" type="text" maxlength="12" autocomplete="nickname" required placeholder="1~12자">
        <p class="form-message" id="formMessage"></p>
        <div class="modal-actions">
          <button class="ghost-button" type="button" id="skipScoreButton">등록 안 함</button>
          <button class="primary-button" type="submit" id="submitScoreButton">기록 등록</button>
        </div>
      </form>
    </section>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="js/config.js?v=2"></script>
  <script src="js/games/shared.js?v=2"></script>
  <script src="js/services/score-board.js?v=2"></script>
  <script src="js/games/val.js?v=3"></script>
  <script src="js/games/vel.js?v=4"></script>
  <script src="js/games/vox.js?v=2"></script>
  <script src="js/ui/loading.js?v=4"></script>
  <script src="js/app.js?v=4"></script>
</body>
</html>
